<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>{{ node_name }} | 分散式帳本控制台</title>
    <!-- 引入專業字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #0f172a;        /* 深藍底 */
            --bg-card: #1e293b;        /* 卡片深灰藍 */
            --bg-result: #000000;      /* 查詢結果純黑底 */
            --text-bright: #ffffff;    /* 純白文字 */
            --accent-cyan: #22d3ee;    /* 青色 (查詢/連結) */
            --accent-green: #10b981;   /* 綠色 (交易) */
            --accent-red: #f43f5e;     /* 紅色 (共識) */
            --border-glow: #334155;
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-bright);
            font-family: 'Inter', sans-serif;
        }

        /* 頂部標題與統計區 */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glow);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .stats-badge {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            padding: 12px 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stats-count { font-size: 2rem; font-weight: 800; display: block; font-family: 'JetBrains Mono'; }

        /* 卡片美化 */
        .card { 
            background-color: var(--bg-card); 
            border: 1px solid var(--border-glow);
            border-radius: 15px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card-header {
            font-weight: 700;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-glow) !important;
            padding: 12px 20px;
        }

        /* 查詢結果區：解決「灰色髒感」，改為霓虹黑框 */
        #queryResult {
            display: none;
            background-color: var(--bg-result) !important;
            border: 2px solid var(--accent-cyan) !important;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
            color: #ffffff !important;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
        }

        /* 輸入框強化亮度 */
        .form-control {
            background-color: #0f172a !important;
            border: 1px solid #475569 !important;
            color: #ffffff !important;
            font-size: 1rem;
        }
        .form-control::placeholder { color: #94a3b8; }
        .form-control:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2); }

        /* 終端機樣式 */
        .terminal { 
            background-color: #000000; 
            color: #4ade80; 
            padding: 15px; 
            border-radius: 10px; 
            height: 280px; 
            overflow-y: auto; 
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid #334155;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        /* 表格與明細顏色 */
        .row-income { color: var(--accent-green) !important; font-weight: bold; background: rgba(16, 185, 129, 0.1); }
        .row-expense { color: var(--accent-red) !important; background: rgba(244, 63, 94, 0.1); }
        
        .btn-bold { font-weight: 700; text-transform: uppercase; padding: 8px 20px; }

        /* 節點狀態面板 */
        .peer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .peer-pill {
            background-color: #0f172a;
            border: 1px solid var(--border-glow);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .peer-pill.online { border-color: var(--accent-green); box-shadow: 0 0 8px rgba(16,185,129,0.25); }
        .peer-pill.offline { opacity: 0.55; }
        .peer-pill.self { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(34,211,238,0.35); }
        .peer-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background-color: #64748b;
            flex-shrink: 0;
        }
        .peer-pill.online .peer-dot { background-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .peer-pill.self .peer-dot { background-color: var(--accent-cyan); box-shadow: 0 0 8px var(--accent-cyan); }
        .peer-meta { display: flex; flex-direction: column; line-height: 1.2; }
        .peer-name { font-weight: 700; color: #f1f5f9; }
        .peer-addr { font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="header-section">
        <div>
            <h2 class="fw-bold text-info mb-0"><i class="fa-solid fa-cube me-2"></i>{{ node_name }}</h2>
            <div class="mt-1 opacity-75 small"><i class="fa-solid fa-network-wired me-1"></i> 節點地址: {{ ip }}</div>
        </div>
        
        <div class="stats-badge">
            <span class="small opacity-75 fw-bold">目前帳本總交易數</span>
            <span class="stats-count" id="totalTxDisplay">0</span>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <span><i class="fa-solid fa-satellite-dish me-2"></i>全網節點狀態</span>
            <span class="d-flex align-items-center gap-3">
                <span id="trustBadge" class="badge bg-secondary">尚未驗證</span>
                <span class="small opacity-75">線上 <span id="peerOnlineCount">0</span> / <span id="peerTotalCount">0</span></span>
            </span>
        </div>
        <div class="card-body">
            <div class="peer-grid" id="peerGrid"></div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-dark text-white"><i class="fa-solid fa-magnifying-glass me-2"></i>帳戶資產與明細</div>
                <div class="card-body">
                    <div class="input-group mb-3">
                        <input type="text" id="queryAccount" class="form-control" placeholder="輸入帳戶名稱">
                        <button class="btn btn-outline-info btn-bold" onclick="checkMoney()">查餘額</button>
                        <button class="btn btn-info btn-bold text-dark" onclick="checkLog()">查明細</button>
                    </div>
                    <div id="queryResult"></div>
                </div>
            </div>

            <div class="card shadow">
                <div class="card-header bg-success text-white"><i class="fa-solid fa-paper-plane me-2"></i>發起交易廣播</div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col">
                            <label class="small opacity-75 mb-1">付款人 (From)</label>
                            <input type="text" id="sender" class="form-control" placeholder="Sender ID">
                        </div>
                        <div class="col">
                            <label class="small opacity-75 mb-1">收款人 (To)</label>
                            <input type="text" id="receiver" class="form-control" placeholder="Receiver ID">
                        </div>
                    </div>
                    <div class="input-group">
                        <input type="number" id="amount" class="form-control" placeholder="輸入金額">
                        <button class="btn btn-success btn-bold px-4" onclick="sendTransaction()">送出交易</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow border-warning">
                <div class="card-header bg-danger text-white"><i class="fa-solid fa-shield-halved me-2"></i>共識防禦機制</div>
                <div class="card-body">
                    <button class="btn btn-warning mb-3 w-100 fw-bold" onclick="checkChain()">本地帳本鏈完整性檢查</button>
                    <div class="input-group">
                        <input type="text" id="rewardAccount" class="form-control" placeholder="獎勵接收帳戶">
                        <button class="btn btn-danger btn-bold" onclick="checkAllChains()">發起全網共識驗證</button>
                    </div>
                </div>
            </div>

            <div class="card shadow">
                <div class="card-header bg-secondary text-white small py-1"><i class="fa-solid fa-terminal me-2"></i>系統日誌</div>
                <div class="card-body p-0">
                    <div class="terminal" id="systemLog">系統就緒...<br></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function logMessage(msg) {
        const logger = document.getElementById('systemLog');
        // 後端訊息中的真實換行 (\n) 與 HTML <br> 都顯示為換行
        const formattedMsg = String(msg).replace(/\n/g, '<br>');
        logger.innerHTML += `[${new Date().toLocaleTimeString()}] ${formattedMsg}<br>`;
        logger.scrollTop = logger.scrollHeight;
    }

    function renderPeers(payload) {
        const grid = document.getElementById('peerGrid');
        document.getElementById('peerOnlineCount').innerText = payload.online_count;
        document.getElementById('peerTotalCount').innerText = payload.total;

        const badge = document.getElementById('trustBadge');
        if (payload.network_trusted) {
            badge.className = 'badge bg-success';
            badge.innerText = '已信任';
            badge.title = '全網共識通過，操作已開放';
        } else {
            badge.className = 'badge bg-danger';
            badge.innerText = '已凍結';
            badge.title = `共識失敗：${payload.network_trusted_reason || '尚未驗證'}（請重新發起全網共識）`;
        }

        grid.innerHTML = payload.peers.map(p => {
            const cls = p.is_self ? 'self' : (p.online ? 'online' : 'offline');
            const status = p.is_self ? '本機' : (p.online ? '線上' : '離線');
            return `
                <div class="peer-pill ${cls}" title="${p.node_id}">
                    <span class="peer-dot"></span>
                    <div class="peer-meta">
                        <span class="peer-name">${p.name}</span>
                        <span class="peer-addr">${p.ip}:${p.port} · ${status}</span>
                    </div>
                </div>`;
        }).join('');
    }

    // --- 自動輪詢機制 ---
    setInterval(async () => {
        try {
            // 1. 原本的 Log 輪詢 (保留)
            let res = await fetch('/api/poll_logs');
            let data = await res.json();
            if (data.logs) { data.logs.forEach(msg => logMessage(msg)); }

            // 2. 【新增】調用你的公式 API
            let statsRes = await fetch('/api/stats');
            let statsData = await statsRes.json();
            document.getElementById('totalTxDisplay').innerText = statsData.total_tx;

            // 3. 【新增】節點存活狀態
            let peersRes = await fetch('/api/peers');
            let peersData = await peersRes.json();
            renderPeers(peersData);

        } catch (e) {}
    }, 1500);

    async function checkMoney() {
        const acc = document.getElementById('queryAccount').value;
        if(!acc) return alert('請輸入帳戶');
        let res = await fetch(`/api/money/${acc}`);
        let data = await res.json();
        document.getElementById('queryResult').style.display = 'block';
        document.getElementById('queryResult').innerHTML = `<strong>${acc}</strong> 的餘額為: <strong>${data.balance}</strong> 元`;
        logMessage(`查詢 ${acc} 餘額完成`);
    }

    async function checkLog() {
        const acc = document.getElementById('queryAccount').value.trim();
        if(!acc) return alert('請輸入帳戶');
        
        let res = await fetch(`/api/log/${acc}`);
        let data = await res.json();
        const resultDiv = document.getElementById('queryResult');
        resultDiv.style.display = 'block';
        
        if (data.logs.length === 0) {
            resultDiv.innerHTML = `<strong>${acc} 的交易明細:</strong><br>無交易紀錄`;
        } else {
            let tableHtml = `
            <strong>${acc} 的交易明細:</strong>
            <div class="table-container">
                <table class="table table-sm table-bordered table-hover text-center mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>發送方 (From)</th>
                            <th>接收方 (To)</th>
                            <th>金額</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            data.logs.forEach(log => {
                let parts = log.split(',');
                if(parts.length >= 3) {
                    let sender = parts[0].trim();
                    let receiver = parts[1].trim();
                    let amount = parts[2].trim();
                    
                    let rowClass = "";
                    if (sender === acc) {
                        rowClass = "table-danger"; 
                    } else if (receiver === acc) {
                        rowClass = "table-success";
                    }

                    tableHtml += `<tr class="${rowClass}">
                        <td>${sender}</td>
                        <td>${receiver}</td>
                        <td>${amount}</td>
                    </tr>`;
                }
            });
            
            tableHtml += `</tbody></table></div>`;
            resultDiv.innerHTML = tableHtml;
        }
        logMessage(`查詢 ${acc} 紀錄完成 (共 ${data.logs.length} 筆)`);
    }

    async function sendTransaction() {
        // 1. 抓取網頁輸入資料
        const data = {
            sender: document.getElementById('sender').value,
            receiver: document.getElementById('receiver').value,
            amount: document.getElementById('amount').value
        };

        // 如果輸入欄位是空的，先擋下來
        if (!data.sender || !data.receiver || !data.amount) {
            addLog("請填寫完整的交易資訊", "#ffc107");
            return;
        }

        try {
            // 2. 發起請求並「等待」回應
            const response = await fetch('/api/transaction', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // 3. 解析 JSON 內容
            const result = await response.json();

            // 4. 根據 HTTP 狀態碼或自定義 status 判斷結果
            if (response.ok && result.status === "success") {
                // 交易成功 (200 OK)
                addLog(`${result.message}: ${data.sender} -> ${data.receiver} ($${data.amount})`, "#28a745");
                // 如果「付款人」正好是目前查詢的帳戶，就自動刷新餘額；否則什麼都不做
                const queryAcc = document.getElementById('queryAccount').value.trim();
                if (queryAcc && (queryAcc === data.sender || queryAcc === data.receiver)) {
                    checkMoney();
                }
            } else {
                // 邏輯錯誤 (例如 400 餘額不足)
                addLog(`交易失敗: ${result.message}`, "#dc3545");
            }

        } catch (error) {
            // 系統崩潰或網路斷線
            console.error("發生錯誤:", error);
            addLog(`系統異常: ${error.name} - ${error.message}`, "#ffc107");
        }
    }

    function addLog(msg, color = "white") {
        const logBox = document.getElementById('systemLog');
        if (!logBox) {
            console.warn("找不到 log-box 元素，訊息:", msg);
            return;
        }
        const now = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color: ${color}; margin-bottom: 5px;">[${now}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function checkChain() {
        let res = await fetch('/api/checkChain');
        let data = await res.json();
        logMessage(`本地檢查: ${data.message}`);
    }

    async function checkAllChains() {
        const target = document.getElementById('rewardAccount').value;
        if(!target) return alert('請輸入要接收獎勵的帳戶');
        logMessage('發起全網共識比對中...');
        
        let res = await fetch(`/api/checkAllChains/${target}`);
        let data = await res.json();
        logMessage(`共識結果:<br>${data.message}`);
    }
</script>
</body>
</html>
